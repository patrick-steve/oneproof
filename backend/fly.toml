# Fly.io app config — OneProof prover backend.
# Run `fly launch --no-deploy` once to create the app, then ./prepare.sh && fly deploy.
# See DEPLOY.md for the full one-time setup.

app = "oneproof"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# MEASURED: setting RAYON_NUM_THREADS hurts more than helps.
#   shared-cpu-4x + RAYON default (bb picks 2) → 62s   ← keep this
#   shared-cpu-4x + RAYON=4                    → 171s  (worse, memory bw)
#   performance-2x + RAYON=4                   → 128s  (oversubscribed)
# bb's internal default thread count is calibrated for the system; leave
# it alone. The CACHE is what makes repeat calls instant; the first call
# is what it is.

[http_service]
  internal_port = 8080
  force_https = true
  # Auto-stop on idle to keep this cheap. Cold-start (~5-10s) on first
  # request after sleep is surfaced to the user via a banner on /console
  # that fires a /healthz ping on mount.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  # IMPORTANT: ONE machine, not two. Fly defaults `fly deploy` to 2 for
  # HA, but with auto-stop the autoscaler can reap one mid-request and
  # the client sees "Failed to fetch". `max_machines_running = 1` plus
  # running `fly scale count 1` after deploy keeps us at 1.
  max_machines_running = 1
  processes = ["app"]

# Generous timeouts because aggregator proving can take 30–60s.
[http_service.concurrency]
  type = "requests"
  hard_limit = 8
  soft_limit = 4

# Resources: bb's aggregator proof peaked at 3.84 GB; 8 GB has headroom.
# shared-cpu-4x (4 vCPUs) outperforms performance-2x (2 dedicated cores)
# for bb's aggregator workload — measured 62s vs 128s. bb saturates
# core count over per-core throughput, so more cores wins. RAYON_NUM_THREADS=4
# (above) uses all 4. Aggregator first call ~50-60s, cached calls ~95ms.
[[vm]]
  size = "shared-cpu-4x"
  memory = "8gb"
