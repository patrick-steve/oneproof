# Fly.io app config — OneProof prover backend.
# Run `fly launch --no-deploy` once to create the app, then ./prepare.sh && fly deploy.
# See DEPLOY.md for the full one-time setup.

app = "oneproof"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"        # idle → stop to save credits
  auto_start_machines = true         # cold-start on first request after stop
  min_machines_running = 0
  processes = ["app"]

# Generous timeouts because aggregator proving can take 30–60s.
[http_service.concurrency]
  type = "requests"
  hard_limit = 8
  soft_limit = 4

# Resources: bb's aggregator proof peaked at 3.84 GB on a 4 GB VM and got
# OOM-killed (confirmed in fly logs: "Out of memory: Killed process 679
# (bb) total-vm:4469552kB"). 8 GB has the headroom. shared-cpu-2x caps
# at 4 GB, so bumping to shared-cpu-4x (4 vCPU, 8 GB max). Disk holds
# the toolchain + circuits (~250 MB).
[[vm]]
  size = "shared-cpu-4x"
  memory = "8gb"
